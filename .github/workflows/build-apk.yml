name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Create local.properties
        run: |
          mkdir -p android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" >> android/local.properties

      - name: Generate Gradle Wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
          cd ..

      - name: Verify critical files
        run: |
          echo "=== settings.gradle ==="
          cat android/settings.gradle
          echo ""
          echo "=== chat_screen TextDirection ==="
          grep -n "TextDirection" lib/screens/chat_screen.dart
          echo ""
          echo "=== memories_screen TextDirection ==="
          grep -n "TextDirection" lib/screens/memories_screen.dart
          echo ""
          echo "=== google-services.json ==="
          if [ -f "android/app/google-services.json" ]; then
            echo "✓ موجود"
          else
            echo "✗ مفقود — أضفه إلى android/app/"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kokabna-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
